services:
  - type: web
    name: the-win-list
    runtime: static
    repo: https://github.com/Abheydeep/Habit-Ledger
    branch: release/daily-driver-v1
    buildCommand: npm install && npm run verify:release
    staticPublishPath: ./out
    routes:
      - type: redirect
        source: /launch
        destination: /launch/
    domains:
      - www.mywinlist.com
